version: '3.8'

services:
  # 1. Container Database PostgreSQL Baru (Port diubah)
  postgres-db:
    image: postgres:15-alpine
    container_name: auditchain-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rahasia
      POSTGRES_DB: test_blockchain
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Container Antrean Redis Lokal
  redis-queue:
    image: redis:7-alpine
    container_name: auditchain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gateway-net

  # 3. Container Aplikasi Go (Gateway)
  api-gateway:
    build: .
    container_name: auditchain-api
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-queue:
        condition: service_started
    environment:
      - REDIS_HOST=redis-queue:6379
      - REDIS_PASSWORD=
      - DB_HOST=postgres-db
    volumes:
      - /home/besu/audit_blockchain/organizations:/home/besu/audit_blockchain/organizations:ro
    networks:
      - gateway-net
      - fabric-net     

volumes:
  redis-data:
  postgres-data:

networks:
  gateway-net:
    driver: bridge
  fabric-net:
    external: true     
    name: fabric_test